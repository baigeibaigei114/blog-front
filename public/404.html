<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>DevBlog</title>
  <script>
    // 将路径作为 URL 参数传递
    var path = location.pathname + location.search + location.hash;
    // 去掉 /blog-front 前缀
    if (path.startsWith('/blog-front')) {
      path = path.substring('/blog-front'.length) || '/';
    }
    // 重定向到首页，带上路径参数
    location.replace('/blog-front/#' + path);
  </script>
</head>
<body>
</body>
</html>
